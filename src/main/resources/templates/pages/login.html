<!DOCTYPE html>

<!--看板娘-->
<style type="text/css">
#inner {
	position: relative;
	background-color: #999;
	clip-path: circle(120px at center);
	-webkit-clip-path: circle(120px at center);
}
#cover {
	position: absolute;
	background-color: #CB3837;
	width: 100%;
	height: 100%;
	bottom: 10%;
	transition: all 1s;
	box-shadow: 0 0 0 5px rgba(0, 0, 0, .1);
}
#text {
	position: absolute;
	bottom: 30%;
	font-size: 2em;
	left: 50%;
	transform: translateX(-50%);
	opacity: 0.4;
	font-weight: bold;
}
#detail {
	position: absolute;
	background: rgba(255, 255, 255, .1);
	width: 100%;
	height: 10px;
	bottom: 0;
}
#handle {
	position: absolute;
	background: #ccc;
	bottom: -2px;
	box-shadow: 0 1px 0 1px rgba(0, 0, 0, .1);
	height: 8px;
	left: 50%;
	margin-left: -15px;
	width: 30px;
	cursor: pointer;
}
#live2d {
	cursor: grab;
}
#live2d:active {
	cursor: grabbing;
}
</style>



<link rel="stylesheet" href="https://cdn.jsdelivr.net/semantic-ui/2.2.4/semantic.min.css" ><!-- 前端框架 -->
<link rel="stylesheet" href="dist/css/me.css"><!-- 自定义CSS样式 -->


</head>

			</div>
			<!-- 看板娘 -->

		</div>
	</div>

  
  
  
    <!-- <h2 class="ui teal image header">

<!-- 登录 -->
<script type="text/javascript" src="dist/js/login.js"></script>









<script>
window.addEventListener("load", () => {//监听-window-加载	
	var state 	= 1 , 
		open 	= '83%', 
		close 	= '20%';

	$.ajax({url: "dist/lib/live2d-demo/assets/waifu-tips.js", dataType:"script", cache: true, success: function() {
        $.ajax({url: "dist/lib/live2d-demo/assets/live2d.js", dataType:"script", cache: true, success: function() {
            /* 可直接修改部分参数 */
            /* 在 initModel 前添加 */
            //initModel("dist/lib/live2d-demo/assets/waifu-tips.json");
			var modelId 		= live2d_settings['modelId'] , //localStorage.getItem("modelId"),
				modelTexturesId = live2d_settings['modelTexturesId'];//localStorage.getItem("modelTexturesId");
				
			doLoadModel(modelId, modelTexturesId);
			
        }});
    }});

	function doLoadModel(modelId, modelTexturesId) {
		loadModel(modelId, modelTexturesId);
		setTimeout(() => {
			coverPosition(open);
			state = 2;
		}, 2000);
	}

	function coverPosition(pos) {//函数-cover-移动
		document.getElementById("cover").style.bottom = pos;
	}

	document.getElementById("handle").addEventListener("click", () => {//监听-handle-点击
		if (state == 1) {
			state = 2;
			coverPosition(open);
		}
		else  {
			state = 1;
			coverPosition(close);
		}
	});

	document.querySelector("input[type=password]").addEventListener("focus", () => {//监听-密码-选中
		if (state == 2) {
			state = 1;
			coverPosition(close); //底
		}
	});
	document.querySelector("input[type=password]").addEventListener("blur", () => {//监听-密码-放开
		if (state == 1) {
			state = 2;
			coverPosition(open);
		}
	});
});
</script>
