/*
 * 保存到本地
 */ 
function saveToLocal() {
	let filename = 'download_from_chrome.md' ;
	let content = testEditor.getMarkdown(); 
	doSaveToLocal(filename, content);
}
function doSaveToLocal(filename, content) {
    var blob = new Blob([content], {type: 'text/plain'}); //封装内容
    var url = window.URL.createObjectURL(blob);
    var a = document.createElement('a'); //构建下载按钮

    a.style = "display: none";
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();

    setTimeout(function () {
        document.body.removeChild(a); // 删除 a 按钮
        window.URL.revokeObjectURL(url); //刷新
    }, 5);
}


/*
 * 导入文件
 */
function loadFileListener() {
	$('[type=\"file\"]').bind("change", function(){ //加载md文件
    	console.log("load path" , $(this).val());
        let files = this.files;
        if(files.length){
        	doLoadToRemote(files[0]  , function() {
        		$(this).val(null);
        	});
        }
    });
}
/*
 * 拖入文件
 */
function dropFileListener() {
	let dropbox = document.getElementById("md-content");  
    dropbox.addEventListener("dragenter", dragenter, false);   // true 捕捉, false 冒泡
    dropbox.addEventListener("dragover", dragover, false);  
    dropbox.addEventListener("drop", drop, false);   

	function dragenter(e) {  
	    e.stopPropagation();  
	    e.preventDefault();  
	}  

	function dragover(e) {  
	    e.stopPropagation();  
	    e.preventDefault();  
	}
	
	function drop(e) {  
	    e.stopPropagation();  
	    e.preventDefault();   
	    let dt = e.dataTransfer;  
	    let files = dt.files;
	    if(files.length)
	    {
	    	doLoadToRemote(files[0]);
	    }
	} 
}
function doLoadToRemote(file , func) {
	let name = file.name;//读取选中文件的文件名
    let size = file.size;//读取选中文件的大小
    let reader = new FileReader();//这里是核心！！！读取操作就是由它完成的。
    reader.onload = function(){ //当读取完成之后会回调这个函数，然后此时文件的内容存储到了result中。直接操作即可。
        testEditor.replaceSelection(this.result) ; 
        //在最后load
        //testEditor.gotoLine("last");
        // or
        //testEditor.gotoLine(testEditor.cm.lineCount());
        if(typeof func == 'function') func();
    };
    reader.readAsText(file);//加载
}
