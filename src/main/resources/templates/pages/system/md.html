<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<!-- 引入 -->
<head th:insert="/fragments/_fragments :: head('写博客')"></head>
<body>
<!-- 引入 -->
<nav th:replace="/fragments/_fragments :: menu(null)"></nav>


<!-- md 编辑器 -->
<link rel="stylesheet" th:href="@{/dist/lib/editormd/css/editormd.min.css}">

<!--mind 中间内容-->
<div id="mainContentId" class="m-container-large m-padded-tb-big"><!--m-padded-tb-big 自定义-->



<div class="ui container"><!--container，外层容器，适合响应移动端-->
    <!--主体-->
    <form  class="ui form">
        <!--1标题-->
        <div class="required field">
            <div class="ui left labeled input">
                <div class="ui teal basic compact selection dropdown label">
                    <input type="hidden">
                    <i class="dropdown icon"></i>
                    <div class="text" value="0">原创</div>
                    <div class="menu">
                        <div class="item" data-value="0">原创</div>
                        <div class="item" data-value="1">转载</div>
                        <div class="item" data-value="2">翻译</div>
                    </div>
                </div>
                <input type="text" name="title" placeholder="标题">
            </div>
        </div>
        <!--2内容-->
        <div class="field">
            <div id="md-content" style="z-index: 1 !important"> <!-- 第三方插件 Editor.md -->
                <textarea style="display:none;"></textarea>
            </div>
        </div>
        <div class="ui segment">
        <!--3选项-->
        <div class="two fields">
            <div class="field ">
                <div class="ui left labeled action input">
                    <label class="ui  teal basic  compact label">分类</label>
                    <div class="ui fluid selection  dropdown">
                        <input type="hidden" name="type">
                        <i class="dropdown icon"></i>
                        <div class="default text">分类</div>
                        <div class="menu">
                            <div class="item" data-value="1">错误日志</div>
                            <div class="item" data-value="2">开发者手册</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="field">
                <div class="ui left labeled action input">
                    <label class="ui compact teal basic label">标签</label>
                    <div class="ui fluid selection multiple dropdown"><!--multiple 多个，search 查找-->
                        <input type="hidden" name="tags">
                        <i class="dropdown icon"></i>
                        <div class="default text">标签</div>
                        <div class="menu">
                            <div class="item" data-value="1">java</div>
                            <div class="item" data-value="2">JavaScript</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="field">
            <div class="ui left labeled input">
                <label for="" class="ui teal basic label">首图</label>
                <input type="text" name="indexPicture" placeholder="首图引用地址">
            </div>
        </div>
        <!--4模块选择-->
        <div class="inline fields"><!--inline???-->
            <div class="field">
                <div class="ui checkbox">
                    <input type="checkbox" checked="checked" id="recommend" name="recommend" class="hidden">
                    <label for="recommend">推荐</label>
                </div>
            </div>
            <div class="field">
                <div class="ui checkbox">
                    <input type="checkbox" id="shareInfo" name="shareInfo" class="hidden">
                    <label for="shareInfo">转载声明</label>
                </div>
            </div>
            <div class="field"><!--appreciation赞赏-->
                <div class="ui checkbox">
                    <input type="checkbox" id="appreciation" name="appreciation" class="hidden">
                    <label for="appreciation">赞赏</label>
                </div>
            </div>
            <div class="field">
                <div class="ui checkbox">
                    <input type="checkbox" id="comment" name="comment" class="hidden">
                    <label for="comment">评论</label>
                </div>
            </div>
        </div>
        <!--5操作按钮-->
        <div class="ui right aligned container">
            <!--不写type:默认submit-->
            <!-- <button type="button" class="ui red button" oncanplay="window.history.go(-1)">返回</button> -->
            <button class="ui secondary button" >保存</button>
            <button class="ui primary submit button" >发布</button>
        </div>
        </div>
    </form>
</div>



<script th:src="@{/dist/lib/editormd/editormd.min.js}"></script>

<script>
/*
 * 初始化 markdown 编辑器
 */
var testEditor; //第三方 md edit
$(function() {
    testEditor = editormd("md-content", {
        width   : "100%",
        height  : 640,
        syncScrolling : "single",
        path    : "[[${#request.getContextPath()}]]/dist/lib/editormd/lib/" , 
        emoji   : false
    });
});
/*
 * 表格验证
 */
$('.ui.form').form({ // 指定一些规则
	fields: {
     title : {
         identifier : 'title' ,  //name
         rules : [{
             type: 'empty' ,
             prompt : '标题：请输入博客标题'
         }]
     } , 
     type : {
         identifier : 'type' ,  //name
         rules : [{
             type: 'empty' ,
             prompt : '类型：请选择一个类型'
         }]
     }, 
     tags : {
         identifier : 'tags' ,  //name
         rules : [{
             type: 'empty' ,
             prompt : '标签：至少一个标签'
         }]
 	}
    } , //fields
    setting:{
    },
    onSuccess : function(event, fields) {
    	return false ;
    },
    inline : true,
	//on     : 'blur' //马上提示
}) ;
</script>





</div>
