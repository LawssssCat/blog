<!--topnav-->
<!--[解释]
    ui : 组件
    container : 响应式容器
    segment  : 片段 - 显示为一个占位框
    attached : 贴图效果 - 两个segment联合
    inverted ： 黑色(反转)
    m-padded-tb-mini : 自己家的
-->
<nav th:fragment="menu(n)"  class="ui inverted attached segment m-padded-tb-mini m-shadow-small"> 
    <div class="ui container">
        <div class="ui inverted secondary stackable menu"><!--stackable 可堆叠，适应手机端-->
            <h2 class="ui item header teal"> Blog~ </h2> <!--teal:颜色-->
            <a th:href="@{/index}" 		th:classappend="${n==1} ? 'active'" class="m-item item m-mobile-hide" ><i class=" home icon"></i>首页</a><!--m-item为了选择-->
            <a th:href="@{/types}"		th:classappend="${n==2} ? 'active'" class="m-item item m-mobile-hide"><i class=" idea icon"></i>分类</a>
            <a th:href="@{/tags}" 		th:classappend="${n==3} ? 'active'" class="m-item item m-mobile-hide"><i class=" tags icon"></i>标签</a>
            <a th:href="@{/archives}" 	th:classappend="${n==4} ? 'active'" class="m-item item m-mobile-hide"><i class=" clone icon"></i>归档</a>
            <a th:href="@{/about}" 		th:classappend="${n==5} ? 'active'" class="m-item item m-mobile-hide"><i class=" info icon"></i>关于我</a>
            <div class="m-item right item m-mobile-hide">
	            <div class="ui category  search">
			    	<div class="ui icon input">
				      <input class="prompt" type="text" placeholder="  Search ...">
				      <i class="search icon"></i>
				    </div>
				    <div class="results"></div>
		  		</div>
            </div>
        </div>
    <div>
    <a href="#" class="ui menu toggle black icon button m-right-top m-mobile-show"><!--这里的 menu toggle 没有任何显示效果，只是为了 后续的选择 方便 -->
        <i class="sidebar icon"></i>
    </a>
</nav>

<!-- [显示]/[隐藏]手机端 侧边按钮 -->

<script type="text/javascript">//manu 点击事件
$(function() {
	$("a.m-item").click(function() {//切换
		$("a.m-item").removeClass("active");
		$(this).addClass("active");
	});
}) ; 
</script>

<!-- 动画效果 主内容 -->
<script>
function animateCSS(element, animationName, callback) {
    const node = document.querySelector(element)
    node.classList.add('animated', animationName)

    function handleAnimationEnd() {
        node.classList.remove('animated', animationName)
        node.removeEventListener('animationend', handleAnimationEnd)

        if (typeof callback === 'function') callback()
    }

    node.addEventListener('animationend', handleAnimationEnd)
}
animateCSS('#mainContentId', 'lightSpeedIn');
</script>

<!-- [重要]主内容异步加载 -->
<script type="text/javascript">
$("nav").on("click","a",function(evt) {
	evt.preventDefault(); // 阻止默认的跳转操作
	var uri=$(this).attr('href');
	doUpdateMainContent(uri);
	return false;
})
;
window.addEventListener('popstate', function(evt){
	var url = window.location.href ; 
	doUpdateMainContent(url) ; 
},false) 
;
function doUpdateMainContent(uri){
	if(history.pushState){// 检查浏览器版本-是否有此函数
		$.ajax({ // 异步加载页面
			url : uri , 
			cache : true , //缓存
			success : function(result) {
				var title = $(result).filter("title").text();
				/*++++++++++++++++++++++++++++++++++++++++++*/
				document.title=title; // 分配新的页面标题
				var a = $(result).filter("#mainContentId").html() ; 
				$("#mainContentId").html(a);
				animateCSS('#mainContentId', 'lightSpeedIn');
				/*++++++++++++++++++++++++++++++++++++++++++*/
				var state=({
					url: uri, 
					title: title
					});
				window.history.pushState(state, title, uri);
			}
		});
	}else{ window.location.href=uri ;  } // 如果不支持，使用旧的解决方案-直接转跳
}
</script>
