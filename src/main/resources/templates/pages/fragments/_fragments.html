<!--topnav-->
<!--[解释]
    ui : 组件
    container : 响应式容器
    segment  : 片段 - 显示为一个占位框
    attached : 贴图效果 - 两个segment联合
    inverted ： 黑色(反转)
    m-padded-tb-mini : 自己家的
-->
<nav th:fragment="menu(n)"  class="ui inverted attached segment m-padded-tb-mini m-shadow-small"> 
    <div class="ui container">
        <div class="ui inverted secondary stackable menu"><!--stackable 可堆叠，适应手机端-->
            <h2 class="ui item header teal"> Blog~ </h2> <!--teal:颜色-->
            <a data-pjax th:href="@{/blog/index}" 		th:classappend="${n==1} ? 'active'" class="m-item item m-mobile-hide" ><i class=" home icon"></i>首页</a><!--m-item为了选择-->
            <a data-pjax th:href="@{/blog/types}"		th:classappend="${n==2} ? 'active'" class="m-item item m-mobile-hide"><i class=" idea icon"></i>分类</a>
            <a data-pjax th:href="@{/blog/tags}" 		th:classappend="${n==3} ? 'active'" class="m-item item m-mobile-hide"><i class=" tags icon"></i>标签</a>
            <a data-pjax th:href="@{/blog/archives}" 	th:classappend="${n==4} ? 'active'" class="m-item item m-mobile-hide"><i class=" clone icon"></i>归档</a>
            <a data-pjax th:href="@{/blog/about}" 		th:classappend="${n==5} ? 'active'" class="m-item item m-mobile-hide"><i class=" info icon"></i>关于我</a>
            <div class="m-item right item m-mobile-hide">
	            <div class="ui category  search">
			    	<div class="ui icon input">
				      <input class="prompt" type="text" placeholder="  Search ...">
				      <i class="search icon"></i>
				    </div>
				    <div class="results"></div>
		  		</div>
            </div>
        </div>
    <div>
    <button class="ui menu toggle black icon button m-right-top m-mobile-show"><!--这里的 menu toggle 没有任何显示效果，只是为了 后续的选择 方便 -->
        <i class="sidebar icon"></i>
    </button>
</nav>

<!-- 动画效果 主内容 -->
<script>
function animateCSS(element, animationName, callback) {
    const node = document.querySelector(element)
    node.classList.add('animated', animationName)

    function handleAnimationEnd() {
        node.classList.remove('animated', animationName)
        node.removeEventListener('animationend', handleAnimationEnd)

        if (typeof callback === 'function') callback()
    }

    node.addEventListener('animationend', handleAnimationEnd)
}
animateCSS('#mainContentId', 'lightSpeedIn'); //初始 动画 
$(document).on('pjax:end', function(event) {
		animateCSS('#mainContentId', 'fadeIn'); //换页 动画
})
</script>

<!-- 进度条 配合pjax 香 -->
<script>
NProgress.configure({
	ease:'ease-in-out',
	speed:300  //进度条速度
});
NProgress.start();
$(function() {
	NProgress.done();	
	$(document).on('pjax:start', NProgress.start).on('pjax:end', NProgress.done);
});
</script>

<th:block th:fragment="article-script">
<script>
$(function() {
	
  $('#tocButton').popup({
    popup : $('#tocScreen'),
    on    : 'hover' ,
    inline   : true, 
    hoverable: true,
    position : 'left center'
  }) ; 
  $('.wechat').popup({
    popup:$('#phone-qr'),
    on: 'hover',
    hoverable: true,
    inline   : true,
    position : 'left center'
  });
  $('#payButton').popup({
      popup : $('#payScreen'),
      on    : 'hover' , 
      inline   : true,
      hoverable: true,
      position : 'top center'
  }) ; 
  $("#toTopButton,#comment-container").click(function() {
    $.scrollTo(0 , 500 );
  }) ; 
  Prism.highlightAll();
  tocbot.init({//目录
      // Where to render the table of contents.
      tocSelector: '.js-toc',
      // Where to grab the headings to build the table of contents.
      contentSelector: '.js-toc-content',
      // Which headings to grab inside of the contentSelector element.
      headingSelector: 'h1, h2, h3',
      // For headings inside relative or absolute positioned containers within content.
      hasInnerContainers: true,
  });

})
</script>
