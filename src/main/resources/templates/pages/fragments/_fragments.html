<!--topnav-->
<!--[解释]
    ui : 组件
    container : 响应式容器
    segment  : 片段 - 显示为一个占位框
    attached : 贴图效果 - 两个segment联合
    inverted ： 黑色(反转)
    m-padded-tb-mini : 自己家的
-->
<nav th:fragment="menu(n)"  class="ui inverted attached segment m-padded-tb-mini m-shadow-small"> 
    <div class="ui container">
        <div class="ui inverted secondary stackable menu"><!--stackable 可堆叠，适应手机端-->
            <h2 class="ui item header teal"> Blog~ </h2> <!--teal:颜色-->
            <a th:href="@{/blog/index}" 	th:classappend="${n==1} ? 'active'" class="m-item item m-mobile-hide" ><i class=" home icon"></i>首页</a><!--m-item为了选择-->
            <a th:href="@{/blog/types}"		th:classappend="${n==2} ? 'active'" class="m-item item m-mobile-hide"><i class=" idea icon"></i>分类</a>
            <a th:href="@{/blog/tags}" 		th:classappend="${n==3} ? 'active'" class="m-item item m-mobile-hide"><i class=" tags icon"></i>标签</a>
            <a th:href="@{/blog/archives}" 	th:classappend="${n==4} ? 'active'" class="m-item item m-mobile-hide"><i class=" clone icon"></i>归档</a>
            <a th:href="@{/blog/about}" 	th:classappend="${n==5} ? 'active'" class="m-item item m-mobile-hide"><i class=" info icon"></i>关于我</a>
            <div class="m-item right item m-mobile-hide">
	            <div class="ui category  search">
			    	<div class="ui icon input">
				      <input class="prompt" type="text" placeholder="  Search ...">
				      <i class="search icon"></i>
				    </div>
				    <div class="results"></div>
		  		</div>
            </div>
        </div>
    <div>
    <button class="ui menu toggle black icon button m-right-top m-mobile-show"><!--这里的 menu toggle 没有任何显示效果，只是为了 后续的选择 方便 -->
        <i class="sidebar icon"></i>
    </button>
</nav>

<!-- [显示]/[隐藏]手机端 侧边按钮 -->
<script>
$('.menu.toggle').click(function() {//手机端响应
    $('.m-item').toggleClass('m-mobile-hide');//toggleClass 切换样式状态
}) ;
</script>

<!-- manu active 事件 -->
<script type="text/javascript">
$(function() {
	$("a.m-item").click(function() {//切换
		$("a.m-item").removeClass("active");
		$(this).addClass("active");
	});
}) ; 
</script>



<!-- 动画效果 主内容 -->
<script>
function animateCSS(element, animationName, callback) {
    const node = document.querySelector(element)
    node.classList.add('animated', animationName)

    function handleAnimationEnd() {
        node.classList.remove('animated', animationName)
        node.removeEventListener('animationend', handleAnimationEnd)

        if (typeof callback === 'function') callback()
    }

    node.addEventListener('animationend', handleAnimationEnd)
}
animateCSS('#mainContentId', 'lightSpeedIn');
</script>

<!-- 进度条 配合pjax 香 -->
<script th:src="@{/dist/lib/nprogress/nprogress.js}" type="text/javascript"></script>
<script>
NProgress.configure({
	ease:'ease-in-out',
	speed:300 
});
NProgress.start();
$(function() {
	NProgress.done();	
	$(document).on('pjax:start', NProgress.start).on('pjax:end', NProgress.done);
});
</script>

<!-- pjax 异步加载 -->
<script src="dist/lib/pjax/jquery.pjax.js" type="text/javascript"></script>
<script type="text/javascript">//menu 的 a
$(function() {
	$(document).on('click', 'nav a , h3 a', function(event) {
		 $.pjax.click(event, {
			 container: '#mainContentId' , 
			 fragment:'#mainContentId'
		 });
		 //animateCSS('#mainContentId', 'lightSpeedIn'); //动画
	});
})
</script>
