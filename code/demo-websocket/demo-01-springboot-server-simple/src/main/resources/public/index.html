<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket</title>
</head>
<body>
<div>
    <span>客户端在线测试： http://www.easywoole.com/wstool.html</span>
</div>
<div>
    <textarea id="message-text" cols="200" rows="10"></textarea>
</div>
<button onclick="establish()">建立连接</button>
<button onclick="send()">发送消息</button>
<button onclick="disconnect()">断开连接</button>
<div>
    <div>服务端：<input id="server-info" style="width: 400px;" value="ws://localhost:23380/channel/echo/1"/></div>
    <ul>
        <li>直连： <span>ws://localhost:23380/channel/echo/1</span></li>
        <li>nginx： <span>ws://localhost:23388/channel/echo/1</span></li>
    </ul>
    <div><span id="connect-status">未连接</span></div>
</div>
<div>
    <div id="message-history"></div>
</div>
<script type="text/javascript">
    domMessageHistory = document.getElementById("message-history")
    domMessageText = document.getElementById("message-text")
    domConnectStatus = document.getElementById("connect-status")
    domServerInfo = document.getElementById("server-info")

    if (!('WebSocket' in window)) {
        alert("浏览器不支持WebSocket")
    }
    let url = null;
    let websocket = null

    function disconnect() {
        // 最后发送 bye，由服务器断开连接
        // websocket.send("bye");

        // 也可以由客户端主动断开
        if (websocket) {
            websocket.close();
        }
    }

    function establish() {
        if (websocket) {
            alert("已连接")
            return
        }
        url = domServerInfo.value;

        domConnectStatus.innerHTML = "连接中..." + url
        domConnectStatus.style.color = "#fa0"
        websocket = null
        websocket = new WebSocket(url);

        // 连接打开
        websocket.onopen = e => {
            console.log("连接打开");
            // 创建连接后，往服务器连续写入3条消息
            domConnectStatus.innerHTML = "已连接:" + url
            domConnectStatus.style.color = "#0f0"
            addHistory("chat", "connect establish")
            doSend("hello");
        }
        // 连接断开
        websocket.onclose = e => {
            console.log(`连接关闭:`, e)
            websocket = null;
            if (e.code === 1000) {
                domConnectStatus.innerHTML = "连接关闭：" + (e.reason || "正常关闭");
                domConnectStatus.style.color = "#000"
            } else {
                let reasonDesc = e.reason;
                if (e.code === 1006) {
                    reasonDesc = (reasonDesc || "请检查后端是否启动、或 Nginx 是否支持 WebSocket 转发");
                } else {
                    reasonDesc = (reasonDesc || "未知原因")
                }
                domConnectStatus.innerHTML = "连接异常中断：" + reasonDesc
                domConnectStatus.style.color = "#f00"
            }
            addHistory("chat", "connect closed")
        }
        // 收到消息
        websocket.onmessage = e => {
            console.log(`收到消息：${e.data}`);
            addHistory("server", e.data)
        }
        // 异常
        websocket.onerror = e => {
            console.log("连接异常", e)
        }
    }

    function send() {
        if (!websocket) {
            alert("未连接")
            return
        }
        let message = domMessageText.value;
        if (!message) {
            alert("请输入消息")
            return
        }
        doSend(message)
    }

    function doSend(msg) {
        addHistory("you", msg)
        try {
            websocket.send(msg)
        } catch (err) {
            addHistory("chat", err)
        }
    }

    function addHistory(role, msg) {
        const now = new Date();
        const YYYY = now.getFullYear();
        const MM = String(now.getMonth() + 1).padStart(2, '0'); // 月份從 0 開始，記得 +1
        const DD = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        domMessageHistory.innerHTML = `${YYYY}-${MM}-${DD} ${hh}:${mm}:${ss}` + " [" + role + "] -> " + msg + "<br>" + domMessageHistory.innerHTML
    }

</script>
</body>
</html>
