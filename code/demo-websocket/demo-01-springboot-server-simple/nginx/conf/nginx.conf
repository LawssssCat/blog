
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # 反向代理
    upstream websocket-demo {
      server 127.0.0.1:23380 weight=1;
    }
    server {
        listen 23388;
        server_name localhost;
        # websocket配置
        location /channel/echo {
            proxy_pass http://websocket-demo;
            # 默认60s，ws多久没有数据交互断开连接
            # proxy_read_timeout 3600s;
            # 模拟断开场景
            proxy_read_timeout 10s;
            # proxy_http_version 1.1;
            # $http_请求头，来自客户端请求头，nginx透传，websocket建立连接是通过该请求头标识协议变更（握手时用http，连接建立后用websocket自定义的交互）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

